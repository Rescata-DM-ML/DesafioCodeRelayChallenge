name: CI - React + Postgres
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    # Se mantiene Postgres levantado como servicio en el Job como evidencia de entorno de base de datos
    # y por si algún otro proceso automatizado posterior requiere interactuar con él.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      # TODO 1: clonar el repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # TODO 2: configurar Node.js versión 20
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # TODO 3: instalar dependencias
      - name: Install dependencies
        run: npm ci

      # TODO 5: construir el proyecto para producción
      - name: Build
        run: npm run build
